<!DOCTYPE html>
<html>
<head>
  <script>
    window.onload = function() {
      const links = [
        "https://www.instagram.com/nupals_engeki", // 当たり
        "https://www.instagram.com/niigatayakka_nexus",
        "https://portal.gakuyu.nupals.ac.jp"
      ];

      const weights = [0.6, 0.2, 0.2]; // 確率

      let rand = Math.random();
      let sum = 0;

      for (let i = 0; i < links.length; i++) {
        sum += weights[i];
        if (rand < sum) {
          window.location.href = links[i];
          break;
        }
      }
    }
  </script>
</head>
<body>
  <p>運試し中...</p>
</body>
</html>
