<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>新潟薬科大学サークル運試し</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      text-align: center;
      background-color: #111;
      color: white;
    }
    .result {
      font-size: 1.6em;
      font-weight: bold;
    }
    .sub {
      font-size: 0.8em;
      margin-top: 10px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div>
  <div id="result" class="result">判定中...</div>
  <div class="sub">※もう一回したいなら演劇サークルの練習にきてちょ</div>
</div>

<script>
  const links = [
    "https://www.instagram.com/nupals_engeki/", // 演劇インスタ
    "https://www.instagram.com/niigatayakka_nexus/",//eスポインスタ
    "https://portal.gakuyu.nupals.ac.jp",//学友ポータル
    "https://nupals-gakuyu.info/about-us/",//学友HP
    "https://www.instagram.com/nupmlsshinyakusai/"//新薬祭インスタ
  ];

  // 当たり確率（ここ調整できる）
  const weights = [0.35, 0.05, 0.1,0.3,0.2];

  const messages = [
    "私達とともに活動する運命なのだ！！",
    "貴方には演劇よりもっと良いサークルを紹介するよ！",
    "とりま入団申請なｗｗ",
    "学友会に入るってのはどうよ！",
    "新薬祭を一緒に盛り上げませんか？"
  ];

  function weightedRandom(weights) {
    let rand = Math.random();
    let sum = 0;
    for (let i = 0; i < weights.length; i++) {
      sum += weights[i];
      if (rand < sum) return i;
    }
  }

  const index = weightedRandom(weights);

  // 表示
  document.getElementById("result").innerText = messages[index];

  // 1秒後に遷移
  setTimeout(() => {
    window.location.href = links[index];
  }, 5000);
</script>

</body>
</html>
